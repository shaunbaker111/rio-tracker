<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rio Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #map { height: 70%; width: 100%; }
    #info {
      height: 30%;
      padding: 10px;
      background: #111;
      box-sizing: border-box;
    }
    .row { margin-bottom: 6px; }
    .label { font-weight: 600; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    <div class="row"><span class="label">Lat:</span> <span id="lat">–</span></div>
    <div class="row"><span class="label">Lon:</span> <span id="lon">–</span></div>
    <div class="row"><span class="label">Battery:</span> <span id="battery">–</span>%</div>
    <div class="row"><span class="label">Signal:</span> <span id="rssi">–</span></div>
    <div class="row"><span class="label">Last update:</span> <span id="ts">–</span></div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD9h3d7EkLHeu0cdIt4VhzxEeXBn1OUnlc",
      authDomain: "rio-tracker.firebaseapp.com",
      projectId: "rio-tracker",
      storageBucket: "rio-tracker.firebasestorage.app",
      messagingSenderId: "659356953707",
      appId: "1:659356953707:web:bef61097aec856edf7552e",
      measurementId: "G-VW8Z5TYPD4",
      databaseURL: "https://rio-tracker-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let map, marker;

    function initMap(lat = 52.0, lon = 1.0) {
      const pos = { lat, lng: lon };
      map = new google.maps.Map(document.getElementById("map"), {
        center: pos,
        zoom: 16,
        mapTypeId: "hybrid",
      });
      marker = new google.maps.Marker({ position: pos, map });
    }

    function updateInfo(data) {
      if (!data) return;

      const { lat, lon, battery, rssi, timestamp } = data;

      document.getElementById("lat").textContent = lat ?? "–";
      document.getElementById("lon").textContent = lon ?? "–";
      document.getElementById("battery").textContent = battery ?? "–";
      document.getElementById("rssi").textContent = rssi ?? "–";

      if (timestamp) {
        const d = new Date(timestamp * 1000);
        document.getElementById("ts").textContent = d.toLocaleString();
      }

      if (map && marker && lat && lon) {
        const pos = { lat, lng: lon };
        marker.setPosition(pos);
        map.setCenter(pos);
      }
    }

    initMap();

    const locRef = ref(db, "dog/location");
    onValue(locRef, (snapshot) => updateInfo(snapshot.val()));

    // Register service worker for installable app
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
